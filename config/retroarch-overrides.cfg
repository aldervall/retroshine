video_fullscreen = "true"

# linuxraw reads /dev/input/js2 (the Sunshine Xbox virtual pad) directly via the
# joystick API with no hotplug detection. When Moonlight reconnects and Sunshine
# recreates the Xbox pad, the kernel reuses js minor 2, so linuxraw reopens the
# same path and the controller recovers — no SDL2 hotplug race, no crash/lockup.
# js0 missing, js1 = Mouse passthrough (index 0), js2 = Xbox pad (index 1).
input_joypad_driver = "linuxraw"
input_player1_joypad_index = "1"
