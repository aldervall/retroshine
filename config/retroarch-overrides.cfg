video_fullscreen = "true"

# udev reads evdev directly — avoids SDL2 game-controller DB mapping issues
# that can cause spurious hotkey triggers or crashes with virtual controllers.
input_joypad_driver = "udev"

# Capture crash info: RetroArch writes to /tmp/retroarch.log on exit.
log_to_file = "true"
log_dir = "/tmp"
log_to_file_timestamp = "false"
