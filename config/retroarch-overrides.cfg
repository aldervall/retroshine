video_fullscreen = "true"

# SDL2 detects Sunshine's Xbox One virtual pad correctly (same as ES-DE uses).
# The udev driver skips event30 because the Sunshine pad's EV_KEY bits don't
# fall in the BTN_GAMEPAD range that udev checks for joystick qualification.
input_joypad_driver = "sdl2"

log_to_file = "true"
log_dir = "/tmp"
log_to_file_timestamp = "false"
