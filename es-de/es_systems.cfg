<?xml version="1.0"?>
<systemList>
  <system>
    <name>nes</name>
    <fullname>Nintendo Entertainment System</fullname>
    <path>/roms/nes</path>
    <extension>.nes .NES .zip .ZIP</extension>
    <command>retroarch -L /usr/lib/x86_64-linux-gnu/libretro/nestopia_libretro.so %ROM% --fullscreen --appendconfig /scripts/retroarch-overrides.cfg</command>
    <platform>nes</platform>
    <theme>nes</theme>
  </system>
  <system>
    <name>snes</name>
    <fullname>Super Nintendo</fullname>
    <path>/roms/snes</path>
    <extension>.sfc .SFC .smc .SMC .zip .ZIP</extension>
    <command>retroarch -L /usr/lib/x86_64-linux-gnu/libretro/snes9x_libretro.so %ROM% --fullscreen --appendconfig /scripts/retroarch-overrides.cfg</command>
    <platform>snes</platform>
    <theme>snes</theme>
  </system>
  <system>
    <name>gb</name>
    <fullname>Game Boy</fullname>
    <path>/roms/gb</path>
    <extension>.gb .GB .zip .ZIP</extension>
    <command>retroarch -L /usr/lib/x86_64-linux-gnu/libretro/gambatte_libretro.so %ROM% --fullscreen --appendconfig /scripts/retroarch-overrides.cfg</command>
    <platform>gb</platform>
    <theme>gb</theme>
  </system>
  <system>
    <name>gba</name>
    <fullname>Game Boy Advance</fullname>
    <path>/roms/gba</path>
    <extension>.gba .GBA .zip .ZIP</extension>
    <command>retroarch -L /usr/lib/x86_64-linux-gnu/libretro/mgba_libretro.so %ROM% --fullscreen --appendconfig /scripts/retroarch-overrides.cfg</command>
    <platform>gba</platform>
    <theme>gba</theme>
  </system>
  <system>
    <name>genesis</name>
    <fullname>Sega Genesis / Mega Drive</fullname>
    <path>/roms/genesis</path>
    <extension>.gen .GEN .md .MD .zip .ZIP</extension>
    <command>retroarch -L /usr/lib/x86_64-linux-gnu/libretro/genesis_plus_gx_libretro.so %ROM% --fullscreen --appendconfig /scripts/retroarch-overrides.cfg</command>
    <platform>genesis</platform>
    <theme>genesis</theme>
  </system>
</systemList>