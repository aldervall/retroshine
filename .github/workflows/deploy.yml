name: Deploy RetroShine

on:
  push:
    tags:
      - 'v*'
    branches:
      - master
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g. v1.0.0)'
        required: true
        type: string

env:
  IMAGE_NAME: retroshine

jobs:
  build-and-deploy:
    runs-on: [self-hosted, retroshine]
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=dev-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            .

      - name: Update VERSION file
        if: github.ref_type == 'tag'
        run: |
          echo "${{ steps.version.outputs.VERSION }}" | sed 's/^v//' > VERSION
          git add VERSION
          git -c user.name="RetroShine Bot" \
              -c user.email="bot@retroshine.dev" \
              commit -m "chore: bump version to ${{ steps.version.outputs.VERSION }}" || true

      - name: Deploy container
        run: |
          rsync -av --delete \
            --exclude='roms/' \
            --exclude='scraped-media/' \
            --exclude='.git/' \
            ./ /opt/retroshine/
          cd /opt/retroshine
          docker compose down --remove-orphans 2>/dev/null || true
          docker rm -f retro-shine 2>/dev/null || true
          docker compose up -d

      - name: Verify deployment
        run: |
          echo "=== Container Status ==="
          sleep 5
          docker ps --filter name=retro-shine --format '{{.Names}} {{.Image}} {{.Status}}'
          
          echo "=== Port Check ==="
          for port in 47984 47989 47990 48010; do
            ss -tlnp | grep -q ":$port " && echo "  ✅ Port $port listening" || echo "  ❌ Port $port NOT listening"
          done
          
          echo "=== Core Check ==="
          docker exec retro-shine ls /usr/lib/x86_64-linux-gnu/libretro/snes9x_libretro.so 2>/dev/null \
            && echo "  ✅ snes9x core present" \
            || echo "  ⚠️  snes9x core missing"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          name: RetroShine ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          make_latest: true
